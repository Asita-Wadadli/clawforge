<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Intelligence System — Claw Forge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f18 0%, #111827 100%);
            color: #f0f4f8;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #60a5fa, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .form-card {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #60a5fa;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(10, 15, 24, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            color: #f0f4f8;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #60a5fa;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn {
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, #f87171, #ef4444);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(248, 113, 113, 0.3);
        }
        .output-card {
            background: rgba(31, 41, 55, 0.9);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 20px;
            padding: 32px;
            display: none;
        }
        .output-card.active {
            display: block;
        }
        .output-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(96, 165, 250, 0.3);
        }
        .output-title {
            font-size: 1.5rem;
            color: #60a5fa;
            margin-bottom: 8px;
        }
        .section-title {
            font-size: 1.1rem;
            color: #fbbf24;
            margin: 24px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(251, 191, 36, 0.3);
        }
        .question-list {
            list-style: none;
            counter-reset: question;
        }
        .question-list li {
            padding: 12px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            counter-increment: question;
        }
        .question-list li::before {
            content: counter(question) ". ";
            color: #60a5fa;
            font-weight: 700;
        }
        .five-w-grid {
            display: grid;
            gap: 8px;
        }
        .five-w-item {
            padding: 12px;
            background: rgba(10, 15, 24, 0.4);
            border-radius: 8px;
            border-left: 3px solid #60a5fa;
        }
        .five-w-label {
            color: #60a5fa;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn-secondary {
            flex: 1;
            padding: 12px 24px;
            background: transparent;
            border: 2px solid #60a5fa;
            border-radius: 12px;
            color: #60a5fa;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: rgba(96, 165, 250, 0.1);
        }
        .pricing-banner {
            text-align: center;
            padding: 20px;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .pricing-banner h3 {
            color: #fbbf24;
            margin-bottom: 8px;
        }
        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Interview Intelligence System</h1>
            <p>Turn any topic into a complete interview kit in minutes</p>
        </div>

        <div class="pricing-banner">
            <h3>🎉 Election Season Special</h3>
            <p>Professional interview prep for journalists, hosts & analysts</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label for="topic">Interview Topic *</label>
                <input type="text" id="topic" placeholder="e.g., Economic Recovery Post-Pandemic">
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="guest">Guest Name *</label>
                    <input type="text" id="guest" placeholder="e.g., Minister of Tourism">
                </div>
                <div class="form-group">
                    <label for="title">Guest Title/Role</label>
                    <input type="text" id="title" placeholder="e.g., Minister of Tourism & Investment">
                </div>
            </div>

            <div class="form-group">
                <label for="context">Context/Background</label>
                <textarea id="context" placeholder="Key facts, recent events, controversies, or specific angles you want to explore..."></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="platform">Platform</label>
                    <select id="platform">
                        <option value="radio">Radio</option>
                        <option value="tv">Television</option>
                        <option value="podcast">Podcast</option>
                        <option value="print">Print/Online</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tone">Interview Tone</label>
                    <select id="tone">
                        <option value="neutral">Neutral/Balanced</option>
                        <option value="aggressive">Aggressive/Hard-hitting</option>
                        <option value="soft">Soft/Exploratory</option>
                    </select>
                </div>
            </div>

            <button class="btn" onclick="generateInterview()">Generate Interview Kit →</button>
        </div>

        <div class="output-card" id="output">
            <div class="output-header">
                <div class="output-title">INTERVIEW INTELLIGENCE KIT</div>
                <div id="output-topic"></div>
            </div>

            <div class="section-title">Quick Summary</div>
            <div id="output-summary"></div>

            <div class="section-title">5W Breakdown</div>
            <div class="five-w-grid" id="output-fivew"></div>

            <div class="section-title">Core Questions</div>
            <ol class="question-list" id="output-questions"></ol>

            <div class="section-title">Follow-Up Logic</div>
            <div id="output-followups"></div>

            <div class="section-title">Talking Points</div>
            <div id="output-talkingpoints"></div>

            <div class="action-buttons">
                <button class="btn-secondary" onclick="copyToClipboard()">📋 Copy All</button>
                <button class="btn-secondary" onclick="shareToWhatsApp()">📱 Share to WhatsApp</button>
                <button class="btn-secondary" onclick="downloadPDF()">📄 Download PDF</button>
            </div>
        </div>
    </div>

    <script>
        function generateInterview() {
            const topic = document.getElementById('topic').value;
            const guest = document.getElementById('guest').value;
            
            if (!topic || !guest) {
                alert('Please fill in the required fields (Topic and Guest)');
                return;
            }

            // Show output card
            document.getElementById('output').classList.add('active');
            document.getElementById('output-topic').textContent = topic;

            // Generate content (placeholder - would connect to AI in production)
            document.getElementById('output-summary').innerHTML = `
                <ul style="margin-left: 20px; color: #94a3b8;">
                    <li>Key development in ${topic}</li>
                    <li>Significant public interest and stakeholder impact</li>
                    <li>Multiple perspectives requiring balanced coverage</li>
                </ul>
            `;

            document.getElementById('output-fivew').innerHTML = `
                <div class="five-w-item">
                    <div class="five-w-label">Who</div>
                    <div>Key stakeholders, decision-makers, affected parties</div>
                </div>
                <div class="five-w-item">
                    <div class="five-w-label">What</div>
                    <div>Core issue, event, or development</div>
                </div>
                <div class="five-w-item">
                    <div class="five-w-label">Why</div>
                    <div>Underlying causes, motivations, context</div>
                </div>
                <div class="five-w-item">
                    <div class="five-w-label">When</div>
                    <div>Timeline, urgency, historical context</div>
                </div>
                <div class="five-w-item">
                    <div class="five-w-label">Where</div>
                    <div>Geographic scope, jurisdiction, impact area</div>
                </div>
                <div class="five-w-item">
                    <div class="five-w-label">Impact</div>
                    <div>Consequences for community, economy, politics</div>
                </div>
            `;

            document.getElementById('output-questions').innerHTML = `
                <li>${guest}, walk us through the current situation with ${topic}. What's the latest?</li>
                <li>Your critics say the response has been too slow. How do you respond to that?</li>
                <li>What specific metrics are you using to measure success here?</li>
                <li>There's been talk about [controversy/challenge]. What's your position?</li>
                <li>If you look back six months from now, what would success look like?</li>
                <li>What would you say to [affected group] who feel left behind?</li>
                <li>Your opponent proposes [alternative]. Why is your approach better?</li>
                <li>What's the timeline? When can people expect to see real change?</li>
                <li>If this doesn't work, what's Plan B?</li>
                <li>Final question: What haven't I asked that you think people need to know?</li>
            `;

            document.getElementById('output-followups').innerHTML = `
                <div style="background: rgba(10,15,24,0.4); padding: 16px; border-radius: 8px; margin-bottom: 8px;">
                    <strong style="color: #f87171;">IF</strong> "We're making progress" → <strong>THEN:</strong> "What specific numbers prove that?"
                </div>
                <div style="background: rgba(10,15,24,0.4); padding: 16px; border-radius: 8px; margin-bottom: 8px;">
                    <strong style="color: #f87171;">IF</strong> "It's complicated" → <strong>THEN:</strong> "Help us understand—break it down simply."
                </div>
                <div style="background: rgba(10,15,24,0.4); padding: 16px; border-radius: 8px;">
                    <strong style="color: #f87171;">IF</strong> "The opposition is wrong" → <strong>THEN:</strong> "What evidence supports your position?"
                </div>
            `;

            document.getElementById('output-talkingpoints').innerHTML = `
                <ul style="margin-left: 20px; color: #94a3b8;">
                    <li>Key statistic or achievement to highlight</li>
                    <li>Personal story or example that illustrates the point</li>
                    <li>Counter-argument to anticipate and address</li>
                    <li>Forward-looking vision or commitment</li>
                </ul>
            `;

            // Scroll to output
            document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            const output = document.getElementById('output').innerText;
            navigator.clipboard.writeText(output).then(() => {
                alert('Interview kit copied to clipboard!');
            });
        }

        function shareToWhatsApp() {
            const topic = document.getElementById('topic').value;
            const text = `Interview Intelligence Kit: ${topic}\n\n[Generated questions and analysis ready]`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function downloadPDF() {
            alert('PDF download would be implemented with backend PDF generation');
        }
    </script>
</body>
</html>
