<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawCast — Never Run Out of Smart Questions Again</title>
    <style>
        :root {
            --bg: #0a0f18;
            --bg2: #111827;
            --panel: #1f2937;
            --text: #f0f4f8;
            --muted: #94a3b8;
            --accent: #60a5fa;
            --cta: #f87171;
            --gold: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        /* Hero */
        .hero { 
            text-align: center; 
            padding: 80px 0 60px; 
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, #0f3a5c 100%);
        }
        .hero-badge { 
            display: inline-block; 
            padding: 8px 16px; 
            background: rgba(96,165,250,0.15); 
            border: 1px solid rgba(96,165,250,0.3); 
            border-radius: 999px; 
            font-size: 0.85rem; 
            color: var(--accent); 
            margin-bottom: 24px; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        h1 { font-size: 3.2rem; font-weight: 800; margin-bottom: 20px; line-height: 1.1; }
        .lead { font-size: 1.4rem; color: var(--muted); margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; }
        
        /* Header Image Placeholder */
        .header-image {
            width: 100%;
            max-width: 700px;
            height: 400px;
            margin: 40px auto;
            background: linear-gradient(135deg, rgba(96,165,250,0.1), rgba(248,113,113,0.1));
            border: 2px dashed rgba(96,165,250,0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 1.1rem;
            text-align: center;
        }
        
        /* Problem Section */
        .problem { background: var(--bg2); padding: 80px 0; }
        .problem h2 { text-align: center; font-size: 2rem; margin-bottom: 40px; }
        .problem-grid { display: grid; gap: 20px; max-width: 600px; margin: 0 auto; }
        .problem-item { 
            background: var(--panel); 
            padding: 24px; 
            border-radius: 12px; 
            border-left: 4px solid var(--cta);
        }
        .problem-item h3 { color: var(--cta); margin-bottom: 8px; font-size: 1.1rem; }
        .problem-item p { color: var(--muted); font-size: 0.98rem; }
        
        /* Solution */
        .solution { padding: 80px 0; text-align: center; }
        .solution h2 { font-size: 2rem; margin-bottom: 24px; }
        .solution p.intro { color: var(--muted); max-width: 600px; margin: 0 auto 32px; }
        .features { display: grid; gap: 16px; max-width: 500px; margin: 40px auto; text-align: left; }
        .feature { 
            background: var(--panel); 
            padding: 20px 24px; 
            border-radius: 12px; 
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .feature-icon { font-size: 1.5rem; margin-top: 2px; }
        .feature-text { font-size: 1.02rem; }
        .feature-text strong { display: block; margin-bottom: 4px; }
