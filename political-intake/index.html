<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strategy Intake | Claw Forge Political Intelligence</title>
<link rel="icon" type="image/png" href="/assets/branding/claw-forge-political-intelligence-logo.png">
<meta name="description" content="Start your strategy intake for political communication support." />
<style>
:root{--bg:#0a0f18;--panel:#111827;--line:rgba(255,255,255,.08);--text:#f0f4f8;--muted:#94a3b8;--blue:#60a5fa;--red:#f87171;--input:#1f2937}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--text);line-height:1.6;background:var(--bg)}.wrap{max-width:800px;margin:0 auto;padding:40px 20px}
.nav{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:20px 0;margin-bottom:40px;border-bottom:1px solid var(--line)}.brand{font-weight:800;font-size:1.1rem}.navlinks{display:flex;gap:20px;color:var(--muted);font-size:.9rem}
h1{font-size:2.5rem;line-height:1.2;margin:0 0 16px}.lead{color:var(--muted);font-size:1.1rem;margin:0 0 40px}
.form-group{margin-bottom:24px}label{display:block;margin-bottom:8px;font-weight:600}input,textarea,select{width:100%;padding:14px;background:var(--input);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:1rem}textarea{min-height:120px;resize:vertical}
.btn{padding:14px 28px;border-radius:10px;font-weight:700;border:none;cursor:pointer}.btn-primary{background:var(--red);color:#fff;width:100%;font-size:1.1rem}
.alt{padding:40px;background:var(--panel);border:1px solid var(--line);border-radius:16px;margin:40px 0}.alt h3{margin:0 0 12px}.alt p{color:var(--muted);margin:0}
.footer{text-align:center;color:var(--muted);padding:40px 0;font-size:.9rem}
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <div class="brand">Claw Forge Political Intelligence</div>
    <div class="navlinks"><a href="/political-intelligence/">Overview</a><a href="/rapid-response-desk/">Services</a></div>
  </nav>

  <h1>Strategy Intake</h1>
  <p class="lead">Tell us about your operation and what you're facing. We'll respond within 24 hours with next steps.</p>

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group"><label>Name</label><input type="text" name="name" required /></div>
    <div class="form-group"><label>Email</label><input type="email" name="email" required /></div>
    <div class="form-group"><label>Organization</label><input type="text" name="organization" /></div>
    <div class="form-group"><label>What do you need help with?</label>
      <select name="need" required>
        <option value="">Select...</option>
        <option value="rapid-response">Rapid response to an active issue</option>
        <option value="ongoing-support">Ongoing communication support</option>
        <option value="campaign-prep">Campaign preparation</option>
        <option value="media-training">Media commentary support</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group"><label>Describe the situation</label><textarea name="situation" placeholder="What's happening? What's the timeline? What do you need delivered?"></textarea></div>
    <div class="form-group"><label>Timeline</label>
      <select name="timeline">
        <option value="">When do you need this?</option>
        <option value="24h">Within 24 hours</option>
        <option value="48h">Within 48 hours</option>
        <option value="1week">Within 1 week</option>
        <option value="flexible">Flexible</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Submit Intake</button>
  </form>

  <div class="alt">
    <h3>Prefer to talk first?</h3>
    <p>Book a 15-minute call to discuss your needs: <a href="https://cal.com/clawforge-qo4djf/clawforge-consultation" style="color:var(--blue)">Schedule here →</a></p>
  </div>

  <footer class="footer">
    <p><a href="mailto:kofiadmn@agentmail.to">kofiadmn@agentmail.to</a></p>
  </footer>
</div>
<script src="/assets/chat-widget.js"></script>
</body>
</html>
